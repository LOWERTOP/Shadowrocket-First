<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Redirector</title>

    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/simple-icons@v9/icons/github.svg?v=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin-top: 20%;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 320px;
            margin: 0 auto;
        }

        .btn-group a {
            display: block;
            padding: 12px 0;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }

        .btn-group a:hover {
            background-color: #0056b3;
        }

        #back-link {
            grid-column: 1 / -1;
        }
    </style>
</head>

<body>
    <h1 style="text-align:center;">自动跳转页面</h1>
    <p style="text-align:center;">若有弹出窗口，须点击【允许】</p>

    <div class="btn-group">
        <a id="redirect-link" href="#">手动跳转</a>
        <a id="raw-link" href="#">访问原始链接</a>
    </div>

    <script>
        function getQueryParam(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        function decodeUrl(url) {
            try {
                return decodeURIComponent(url);
            } catch (e) {
                return url;
            }
        }

        function isSafeUrl(url) {
            return !/^(javascript|data|vbscript):/i.test(url);
        }

        const rawUrl = getQueryParam('url');
        const targetUrl = decodeUrl(rawUrl || "");

        if (targetUrl && isSafeUrl(targetUrl)) {

            // 手动跳转
            document.getElementById('redirect-link').href = targetUrl;
            document.getElementById('redirect-link').textContent = '点击一键安装';

            // 提取 https
            let pureUrl = rawUrl || "#";

            try {
                const match = targetUrl.match(/https:\/\/[^\s"'<>]+/i);
                if (match) {
                    pureUrl = match[0];
                }
            } catch (e) {}

            document.getElementById('raw-link').href = pureUrl;
            document.getElementById('raw-link').textContent = '访问直达链接';

            // 自动跳转
            window.location.href = targetUrl;

        } else {
            document.body.innerHTML = `
                <h1 style="text-align:center;">无效的链接！</h1>
                <p style="text-align:center;">请检查 URL 是否正确。</p>
            `;
        }
    </script>
</body>
</html>
