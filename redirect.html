<body>
    <h1>一键安装页面</h1>
    <p>若有弹出窗口，须点击【允许】</p>

    <a id="redirect-link" href="#">手动跳转</a>
    <br>
    <a id="raw-link" href="#" style="background-color:#6c757d;">访问原始链接</a>

    <script>
        function getQueryParam(param) {
            const params = new URLSearchParams(window.location.search);
            return params.get(param);
        }

        function decodeUrl(url) {
            try {
                return decodeURIComponent(url);
            } catch (e) {
                return url;
            }
        }

        const rawUrl = getQueryParam('url');
        const targetUrl = decodeUrl(rawUrl);

        function isValidUrl(url) {
            return /^https?:\/\//i.test(url);
        }

        if (targetUrl && isValidUrl(targetUrl)) {

            // 设置按钮
            document.getElementById('redirect-link').href = targetUrl;
            document.getElementById('raw-link').href = rawUrl || targetUrl;

            document.getElementById('redirect-link').textContent = "点击一键安装";
            document.getElementById('raw-link').textContent = "访问原始链接";

            // ✅ 立即跳转
            window.location.replace(targetUrl);

        } else {
            document.body.innerHTML = `<h1>无效的链接！</h1><p>请检查 URL 是否正确。</p>`;
        }
    </script>
</body>
